name: SonarQube Cloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: Test Coverage · SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is required by SonarQube to:
          # - compute blame data (who changed what line)
          # - correctly detect new vs existing code on PRs
          # - avoid "shallow clone" warnings that break the quality gate
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        # CI=true makes Jest non-interactive and treats warnings as errors
        run: CI=true npm run test:coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
