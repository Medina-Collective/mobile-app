# ── Project identity ────────────────────────────────────────────────────────
# These values must exactly match what SonarQube Cloud shows after import.
# projectKey format: <sonarcloud-org-key>_<github-repo-name>
sonar.projectKey=Medina-Collective_mobile-app
sonar.organization=medina-collective
sonar.projectName=Medina Mobile App

# ── Sources ─────────────────────────────────────────────────────────────────
# app/   → Expo Router screens and layouts (hand-written production code)
# src/   → components, features, services, store, theme, utils
sonar.sources=app,src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ── Exclusions ───────────────────────────────────────────────────────────────
# .expo/ → Expo-generated types and cache (not our code)
# assets/ → binary image/font files, not analyzable
sonar.exclusions=\
  node_modules/**,\
  coverage/**,\
  .expo/**,\
  assets/**,\
  src/**/index.ts

# Files excluded from coverage calculation
# app/ screens are excluded from coverage because they contain JSX/navigation
# wiring that requires full render-tree testing (integration tests, not unit tests).
# They are still analyzed for code quality — just not penalized for missing unit coverage.
sonar.coverage.exclusions=\
  app/**,\
  src/**/index.ts,\
  src/**/*.d.ts,\
  src/**/__tests__/**,\
  src/**/*.test.{ts,tsx},\
  src/**/*.spec.{ts,tsx},\
  src/services/**

# ── Coverage ─────────────────────────────────────────────────────────────────
# Path to the LCOV report generated by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Language ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
