# ── Project identity ────────────────────────────────────────────────────────
# These values must exactly match what SonarQube Cloud shows after import.
# projectKey format: <sonarcloud-org-key>_<github-repo-name>
sonar.projectKey=Medina-Collective_mobile-app
sonar.organization=medina-collective
sonar.projectName=Medina Mobile App

# ── Sources ─────────────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ── Exclusions ───────────────────────────────────────────────────────────────
sonar.exclusions=\
  node_modules/**,\
  coverage/**,\
  .expo/**,\
  assets/**,\
  app/**,\
  src/**/index.ts

# Files excluded from coverage calculation (barrel files, type declarations)
sonar.coverage.exclusions=\
  src/**/index.ts,\
  src/**/*.d.ts,\
  src/**/__tests__/**,\
  src/**/*.test.{ts,tsx},\
  src/**/*.spec.{ts,tsx}

# ── Coverage ─────────────────────────────────────────────────────────────────
# Path to the LCOV report generated by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Language ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
